name = "stage5-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Worker routes
routes = [
  { pattern = "api.stage5.tools", custom_domain = true }
]

# Environment variables (runtime-accessed ENV)
[vars]
ALLOWED_ORIGINS = "https://stage5.tools,http://localhost:3000"
AUDIO_CREDIT_CALIBRATION = "1.0"
TOKEN_CREDIT_CALIBRATION = "1.0"
RELAY_TRANSLATION_MAX_INFLIGHT = "24"
RELAY_TRANSLATION_DISPATCH_BATCH = "6"
RELAY_TRANSLATION_GLOBAL_MAX_PENDING = "600"
RELAY_TRANSLATION_USER_MAX_ACTIVE = "2"
RELAY_TRANSLATION_USER_RATE_WINDOW_SEC = "60"
RELAY_TRANSLATION_USER_RATE_MAX_REQUESTS = "12"
RELAY_TRANSLATION_ALERT_QUEUE_DEPTH = "120"
RELAY_TRANSLATION_ALERT_CONSECUTIVE_FAILURES = "4"
RELAY_TRANSLATION_ALERT_COOLDOWN_MS = "60000"
PAYMENT_ALERTS_ENABLED = "1"
PAYMENT_ALERT_EMAIL_FROM = "noreply@stage5.tools"
PAYMENT_ALERT_EMAIL_TO = "mikey@stage5.tools"


# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "stage5_db"
database_id = "84286ce2-3c1f-45ba-8183-a8540bd5b32b"

[[durable_objects.bindings]]
name = "PAYMENT_EVENTS"
class_name = "PaymentEventsDurableObject"

[[migrations]]
tag = "payment-events-v1"
new_sqlite_classes = ["PaymentEventsDurableObject"]

# R2 Storage for large file uploads (transcription)
[[r2_buckets]]
binding = "TRANSCRIPTION_BUCKET"
bucket_name = "stage5-transcription-uploads"

# R2 API credentials for presigned URLs (set via wrangler secret)
# R2_ACCESS_KEY_ID - R2 API token access key
# R2_SECRET_ACCESS_KEY - R2 API token secret key
# R2_ACCOUNT_ID - Cloudflare account ID
